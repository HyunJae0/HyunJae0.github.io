<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MY GitHub Page</title>

  <link rel="stylesheet" href="assets/style.css" />
  <script defer src="assets/script.js"></script>
</head>

<body id="top">
  <!-- 상단 고정 네비게이션 -->
  <header class="site-header">
    <nav class="nav">
      <a class="brand" href="#top">MYNAME</a>

      <div class="nav-links" aria-label="페이지 이동">
        <a class="nav-link" href="#top">홈</a>
        <a class="nav-link" href="#projects">프로젝트</a>
        <a class="nav-link" href="#side-projects">사이드-프로젝트</a>
      </div>

      <!-- 주간/야간 모드 토글 -->
      <button
        id="theme-toggle"
        class="theme-toggle"
        type="button"
        aria-label="주간/야간 모드 전환"
        aria-pressed="false"
      >
        <span id="theme-icon" aria-hidden="true">🌙</span>
        <span id="theme-label">야간</span>
      </button>
    </nav>
  </header>

  <main class="container">
    <!-- 홈 섹션 -->
    <section id="home" class="section">
      <h1 class="title">MYNAME</h1>
      <p class="lead">여기는 홈 섹션입니다. (나중에 소개/관심분야로 채우면 됨)</p>

      <div class="grid">
        <article class="card">
          <h2>소개</h2>
          <p class="muted">여기에 소개 내용이 들어갈 예정</p>
        </article>

        <article class="card">
          <h2>관심 분야</h2>
          <p class="muted">여기에 관심 분야 내용이 들어갈 예정</p>
        </article>
      </div>
    </section>

    <!-- 프로젝트 섹션 -->
    <section id="projects" class="section">
      <h2>프로젝트</h2>

      <div class="cards">
        <article class="card">
          <h3>프로젝트 1</h3>
          <p class="muted">설명</p>
          <div class="meta">
            <a href="#" target="_blank" rel="noreferrer">GitHub</a>
            <a href="#" target="_blank" rel="noreferrer">Demo/Docs</a>
          </div>
        </article>
      </div>
    </section>

    <!-- 사이드 프로젝트 섹션 -->
    <section id="side-projects" class="section">
      <h2>사이드-프로젝트</h2>

      <div class="cards">
        <article class="card">
          <h3>사이드 프로젝트 1</h3>
          <p class="muted">설명</p>
          <div class="meta">
            <a href="#" target="_blank" rel="noreferrer">GitHub</a>
          </div>
        </article>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <small>© <span id="year"></span> MYNAME</small>
  </footer>
</body>
</html>
